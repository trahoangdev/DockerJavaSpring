name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: trahoangdev/hoangtrongtra
  DEPLOY_REPO: trahoangdev/hoangtrongtra

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=ref,event=branch

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Triển khai lên DevOps Classroom
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "Thiếu secret DEPLOY_URL. Vào Settings > Secrets and variables > Actions để thêm."
            exit 1
          fi

          # Normalize value copied from UI and reject malformed placeholders/multiline secrets.
          DEPLOY_URL_CLEAN=$(printf '%s' "$DEPLOY_URL" | tr -d '\r')
          if printf '%s' "$DEPLOY_URL_CLEAN" | grep -q '[{}]'; then
            echo "DEPLOY_URL không hợp lệ: phát hiện ký tự { hoặc }."
            echo "Hãy đặt secret DEPLOY_URL là đúng 1 dòng URL webhook, ví dụ: http://host:port/webhook/deploy/<token>"
            exit 1
          fi
          if printf '%s' "$DEPLOY_URL_CLEAN" | grep -q '[[:space:]]'; then
            echo "DEPLOY_URL không hợp lệ: chứa khoảng trắng hoặc xuống dòng."
            echo "Hãy đặt secret DEPLOY_URL là đúng 1 dòng URL webhook."
            exit 1
          fi
          if ! printf '%s' "$DEPLOY_URL_CLEAN" | grep -Eq '^https?://'; then
            echo "DEPLOY_URL không hợp lệ: phải bắt đầu bằng http:// hoặc https://"
            exit 1
          fi

          REPO="$DEPLOY_REPO"
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "$DEPLOY_URL_CLEAN?repo=$REPO&tag=latest")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)

          echo "Webhook HTTP: $CODE"
          if ! [ "$CODE" -eq "$CODE" ] 2>/dev/null; then
            echo "Không đọc được HTTP status từ webhook response."
            echo "Raw response:"
            echo "$RESPONSE"
            exit 1
          fi
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi

          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
